<!DOCTYPE html>
<html lang="en" ng-app="stageAlpha">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title ng-bind="$root.pageTitle + ' | StageAlpha'">StageAlpha</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,700&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/pages.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar" ng-controller="NavController">
    <a href="#!/" class="navbar-brand">Stage<span>Alpha</span></a>
    <div class="navbar-links">
      <a href="#!/equipment">Equipment</a>
      <a href="#!/booking" ng-show="isLoggedIn">Book Now</a>
      <a href="#!/admin" ng-show="isAdmin">Admin</a>
    </div>
    <div class="navbar-right">
      <a href="#!/booking" class="cart-btn" ng-show="isLoggedIn && cartCount > 0">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span class="cart-badge">{{cartCount}}</span>
      </a>
      <a href="#!/login" class="btn btn-outline btn-sm" ng-hide="isLoggedIn">Sign In</a>
      <a href="#!/profile" class="text-secondary pointer" style="font-size:0.875rem" ng-show="isLoggedIn">[ {{currentUser.name}} ]</a>
      <button class="btn btn-ghost btn-sm" ng-show="isLoggedIn" ng-click="logout()">Sign Out</button>
    </div>
  </nav>

  <!-- TOAST NOTIFICATIONS -->
  <div class="toast-container" ng-controller="ToastController">
    <div class="toast toast--{{t.type}}" ng-repeat="t in toasts track by t.id" ng-class="{'toast-out': t.closing}">
      <span>{{t.message}}</span>
    </div>
  </div>

  <!-- MAIN VIEW -->
  <main>
    <div ng-view></div>
  </main>

  <footer>
    <div class="container">
      <span class="label">StageAlpha &copy; 2025 · Event Equipment Rental Platform · NMIMS MPSTME Shirpur</span>
    </div>
  </footer>

  <!-- Scripts — ORDER MATTERS -->
  <script src="/js/artistic.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular-route.min.js"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/services/api.service.js"></script>
  <script src="/js/services/auth.service.js"></script>
  <script src="/js/services/cart.service.js"></script>
  <script src="/js/services/socket.service.js"></script>
  <script src="/js/services/toast.service.js"></script>
  <script src="/js/controllers/ToastController.js"></script>
  <script src="/js/controllers/nav.controller.js"></script>
  <script src="/js/controllers/home.controller.js"></script>
  <script src="/js/controllers/profile.controller.js"></script>
  <script src="/js/controllers/auth.controller.js"></script>
  <script src="/js/controllers/equipment-list.controller.js"></script>
  <script src="/js/controllers/equipment-detail.controller.js"></script>
  <script src="/js/controllers/booking.controller.js"></script>
  <script src="/js/controllers/booking-status.controller.js"></script>
  <script src="/js/controllers/admin.controller.js"></script>
  <script src="/js/controllers/pricing.controller.js"></script>
  <script src="/js/controllers/backtest.controller.js"></script>
</body>
</html>
