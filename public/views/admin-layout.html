<!-- ADMIN LAYOUT - New Professional Interface -->
<div ng-controller="AdminLayoutCtrl" class="admin-layout">
  
  <!-- SIDEBAR NAVIGATION -->
  <aside class="admin-sidebar" ng-class="{'open': sidebarOpen}">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
        </svg>
        <span>Stage</span><span class="brand-alt">Alpha</span>
      </div>
      <button class="sidebar-close" ng-click="toggleSidebar()" ng-show="!sidebarOpen">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <!-- MENU ITEMS -->
    <nav class="sidebar-menu">
      <button class="menu-item" 
              ng-repeat="item in menuItems" 
              ng-click="navigate(item.url)"
              ng-class="{'active': item.active}">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="menu-icon">
          <use href="#icon-{{item.icon}}"></use>
        </svg>
        <span class="menu-label">{{item.title}}</span>
      </button>
    </nav>

    <!-- SIDEBAR FOOTER -->
    <div class="sidebar-footer">
      <button class="user-menu" ng-click="logout()" title="Logout">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
      </button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <div class="admin-main">
    
    <!-- TOP NAVIGATION BAR -->
    <header class="admin-header">
      <button class="toggle-sidebar" ng-click="toggleSidebar()">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>

      <h1 class="page-title">Admin Dashboard</h1>

      <div class="header-actions">
        <!-- User Profile -->
        <div class="user-profile">
          <div class="user-avatar">{{currentUser.name.charAt(0).toUpperCase()}}</div>
          <div class="user-info">
            <div class="user-name">{{currentUser.name}}</div>
            <div class="user-role">Admin</div>
          </div>
        </div>
        
        <!-- Logout Button -->
        <button class="btn btn-icon" ng-click="logout()" title="Logout">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </button>
      </div>
    </header>

    <!-- CONTENT AREA -->
    <main class="admin-content">
      <div ng-view></div>
    </main>

  </div>

</div>
