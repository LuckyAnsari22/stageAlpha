<div class="auth-page">
  <div class="auth-box">
    <div style="text-align:center; margin-bottom:2rem; position:relative;">
      <div class="heading-lg" style="margin-bottom:0.25rem;">Reset Password</div>
      <p class="text-2" style="font-size:0.9rem;">Enter your email to receive reset instructions</p>
    </div>

    <div class="alert alert-success" ng-show="success">
      If an account with that email exists, you'll receive reset instructions shortly.
    </div>

    <div class="alert alert-danger" ng-show="error">{{error}}</div>

    <form ng-submit="resetPassword()" ng-hide="success">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="input" ng-model="resetEmail" required placeholder="you@example.com">
      </div>
      <button type="submit" class="btn btn-primary btn-lg w-full mt-3" ng-disabled="!resetEmail || submitting">
        {{submitting ? 'Sending...' : 'Send Reset Link'}}
      </button>
    </form>

    <div class="auth-footer">
      Remember your password? <a href="#!/login">Sign in</a>
    </div>
  </div>
</div>
